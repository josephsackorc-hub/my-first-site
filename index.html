<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simple dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <i class="fa-solid fa-graduation-cap"></i>
          <h2>WVSTU</h2>
        </div>

        <nav class="sidebar-menu">
          <a href="#" class="active"
            ><i class="fa-regular fa-star"></i>Dashboard</a
          >

          <a href="#"><i class="fa-regular fa-bookmark"></i>my Courses</a>

          <a href="#"> <i class="fa-regular fa-calendar-days"></i>Schedule</a>

          <a href="#"><i class="fa-regular fa-file-lines"></i>Assignment</a>

          <a href="#"><i class="fa-solid fa-chart-bar"></i>Grade</a>

          <a href="#"><i class="fa-brands fa-files-pinwheel"></i> Setting</a>
        </nav>
      </aside>

      <main class="Content">
        <header class="main-header">
          <div class="header-text">
            <h3>
              Welcome To Web Vission <span>Software Tech University</span>
            </h3>
            <a href="#"><p>@www.wvstu.rw.ac.lib.com</p></a>
          </div>

          <div class="user-profile">
            <i class="fa-regular fa-bell"></i>
          </div>

          <div class="profile-avator">
            <i class="fa-solid fa-user"></i>
          </div>
        </header>
        <div class="search-bar">
          <input type="search" placeholder="search course.." />
        </div>
        <section class="card">
          <div class="grid-card"></div>
        </section>
        <div class="list">
          <h1>list of some of our courses</h1>
          <ul>
            <li>
              Computer science
            </li>
            <li>
              mathematics
            </li>

            <li>
              English
            </li>
            <li>Physics</li>
          </ul>
        </div>
      </main>
    </div>
  </body>
</html>
